name: Release of build-slurm container multi-arch

on:
  workflow_dispatch:
  push:
    paths:
      - 'build/slurm/opensuse/Containerfile'
      - 'build/slurm/ubuntu/Containerfile'
      - 'build/slurm/rockylinux/Containerfile'

permissions:
  contents: write
  packages: write
  actions: read

env:
  REGISTRY: ghcr.io
  REPO: ghcr.io/${{ github.repository }}/build-slurm


jobs:
  build:
    strategy:
      matrix:
        #os: [ opensuse-15.5, opensuse-15.6, ubuntu-24.04, ubuntu-25.10, ubuntu-26.04 ]
        #slurm_version: [ 24.05.3-1, 24.11.7-1, 25.05.4-1, 25.11.6-1, 26.05.0-1 ] 
        #arch: [ amd64, arm64 ]
        os: [ rockylinux-10 ]
        slurm_version: [ 26.05.0-1 ] 
        arch: [ amd64 ]
        include:
          - arch: amd64
            runner: ubuntu-latest
          #- arch: arm64
          #  runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        id: buildx

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push single-arch image
        env:
          TAG: "${{ matrix.slurm_version }}-${{ matrix.os }}-${{ matrix.arch }}"
        run: |
          CTX="build/slurm"
          OS_NAME=$(echo "${{ matrix.os }}" | cut -d'-' -f1)
          OS_VERSION=$(echo "${{ matrix.os }}" | cut -d'-' -f2)
          docker buildx build \
            --builder "${{ steps.buildx.outputs.name }}" \
            --platform linux/${{ matrix.arch }} \
            --file build/slurm/${OS_NAME}/Containerfile \
            --build-arg os_version=${OS_VERSION} \
            --build-arg slurm_version=${{ matrix.slurm_version }} \
            --tag  "${{ env.REPO }}:${{ env.TAG }}" \
            --push \
            "${CTX}"

# Multi-arch manifest that references images for both architectures
  manifest:
    name: Create multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        #os: [ opensuse-15.5, opensuse-15.6, ubuntu-24.04, ubuntu-25.10, ubuntu-26.04 ]
        #slurm_version: [ 24.05.3-1, 24.11.7-1, 25.05.4-1, 25.11.6-1, 26.05.0-1 ] 
        os: [ rockylinux-10 ]
        slurm_version: [ 26.05.0-1 ] 

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify single-arch images exist
        env:
          TAG_PREFIX: "${{ matrix.slurm_version }}-${{ matrix.os }}"
        run: |
          set -euo pipefail

          IMAGES=(
            "${{ env.REPO }}:${{ env.TAG_PREFIX }}-amd64"
            "${{ env.REPO }}:${{ env.TAG_PREFIX }}-arm64"
          )

          for img in "${IMAGES[@]}"; do
            echo "Inspecting $img ..."
            if ! docker buildx imagetools inspect "$img" > /dev/null; then
              echo "::error file=manifest.yml::Image not found: $img"
              exit 1
            fi
          done

      - name: Create & push multi-arch manifest
        env:
          TAG_PREFIX: "${{ matrix.slurm_version }}-${{ matrix.os }}"
        run: |
          apt-get update && apt-get install -y --no-install-recommends skopeo jq
          TAG=$(skopeo inspect --config docker://${{ env.REPO }}:${{ env.TAG_PREFIX }}-amd64 | jq -r '.config.Labels["org.opencontainers.image.version"]')
          docker buildx imagetools create \
            --tag "${{ env.REPO }}:${TAG}" \
            "${{ env.REPO }}:${{ env.TAG_PREFIX }}-amd64" \
            "${{ env.REPO }}:${{ env.TAG_PREFIX }}-arm64"

