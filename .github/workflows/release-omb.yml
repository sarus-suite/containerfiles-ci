name: Release omb-openmpi multi-Arch

on:
  push:
    # only trigger when the omb-openmpi Containerfile changes
    paths:
      - 'hpc/benchmarks/omb-openmpi/Containerfile'

permissions:
  contents: write
  packages: write
  actions: read

env:
  REGISTRY: ghcr.io
  REPO: ghcr.io/${{ github.repository }}/omb

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: omb-openmpi
            arch: amd64
            runner: ubuntu-latest
          - service: omb-openmpi
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        id: buildx

      - name: Log in to GHCR
        uses: docker/login-action@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push single-arch image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/${{ matrix.service }}"
          docker buildx build \
            --builder "${{ steps.buildx.outputs.name }}" \
            --platform linux/${{ matrix.arch }} \
            --file hpc/benchmarks/${{ matrix.service }}/Containerfile \
            --tag   "${{ env.REPO }}:build-${{ matrix.service }}-${{ matrix.arch }}" \
            --push \
            .

  manifest:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        service: [omb-openmpi]

    runs-on: ubuntu-latest

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify single-arch images exist
        run: |
          set -euo pipefail

          IMAGES=(
            "${{ env.REPO }}:build-${{ matrix.service }}-amd64"
            "${{ env.REPO }}:build-${{ matrix.service }}-arm64"
          )

          for img in "${IMAGES[@]}"; do
            echo "Inspecting $img ..."
            if ! docker buildx imagetools inspect "$img" > /dev/null; then
              echo "::error file=manifest.yml::Image not found: $img"
              exit 1
            fi
          done

      - name: Create & push multi-arch manifest
        run: |
          apt-get update && apt-get install -y --no-install-recommends skopeo jq
          TAG=$(skopeo inspect --config docker://${{ env.REPO }}:build-${{ matrix.service }}-amd64 | jq '.config.Labels["org.opencontainers.image.version"]' | tr -d '"')
          docker buildx imagetools create \
            --tag "${{ env.REPO }}:${TAG}" \
            "${{ env.REPO }}:build-${{ matrix.service }}-amd64" \
            "${{ env.REPO }}:build-${{ matrix.service }}-arm64"
