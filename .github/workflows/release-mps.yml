name: Release benchmark MPS Multi-Arch

on:
  push:
    paths:
      - 'hpc/benchmarks/mps/Containerfile'

permissions:
  contents: write
  packages: write
  actions: read

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: mps
            arch: amd64
            runner: ubuntu-latest
          - service: mps
            arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        id: buildx

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push single-arch image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.service }}"
          docker buildx build \
            --builder "${{ steps.buildx.outputs.name }}" \
            --platform linux/${{ matrix.arch }} \
            --file hpc/benchmarks/${{ matrix.service }}/Containerfile \
            --tag   "${IMAGE}:latest-${{ matrix.arch }}" \
            --push \
            .

  manifest:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        service: [mps]

    runs-on: ubuntu-latest

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify single-arch images exist
        run: |
          set -euo pipefail
          REPO="${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.service }}"
          for ARCH in amd64 arm64; do
            IMG="${REPO}:latest-${ARCH}"
            echo "inspecting $IMG"
            if ! docker buildx imagetools inspect "$IMG" > /dev/null; then
              echo "::error file=manifest.yml::Image not found: $IMG"
              exit 1
            fi
          done

      - name: Create & push multi-arch manifest
        run: |
          REPO="${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.service }}"
          docker buildx imagetools create \
            --tag "${REPO}:latest" \
            "${REPO}:latest-amd64" \
            "${REPO}:latest-arm64"

