name: Release of comm-fwk container Multi-arch

on:
  push:
    branches: [pipelines_update]

permissions:
  contents: write
  packages: write
  actions: read

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}


jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        id: buildx

      - name: Log in to GHCR
        uses: docker/login-action@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push single‑arch image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.REPO }}/comm-fwk"
          docker buildx build \
            --builder "${{ steps.buildx.outputs.name }}" \
            --platform linux/${{ matrix.arch }} \
            --file hpc/communication/comm-fwk/Containerfile \
            --tag   "${IMAGE}:build-${{ matrix.arch }}" \
            --push \
            .

# Multi-arch manifest that references both images
  manifest:
    name: Create multi‑arch manifest
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify single‑arch images exist
        run: |
          set -euo pipefail

          REPO="${{ env.REGISTRY }}/${{ env.REPO }}/comm-fwk"
          IMAGES=(
            "${REPO}:build-amd64"
            "${REPO}:build-arm64"
          )

          for img in "${IMAGES[@]}"; do
            echo "Inspecting $img ..."
            if ! docker buildx imagetools inspect "$img" > /dev/null; then
              echo "::error file=manifest.yml::Image not found: $img"
              exit 1
            fi
          done

      - name: Create & push multi‑arch manifest
        run: |
          REPO="${{ env.REGISTRY }}/${{ env.REPO }}/comm-fwk"
          TAG=$(docker inspect -f '{{ index .Config.Labels "org.opencontainers.image.version" }}'' "${REPO}:build-arm64")
          docker buildx imagetools create \
            --tag "${REPO}:${TAG}" \
            "${REPO}:build-amd64" \
            "${REPO}:build-arm64"

